<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fan Page | Jazmin Andrea Bautista Oyuela</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Bricolage+Grotesque:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>
  <div class="noise"></div>

  <main class="screen">
    <section class="hero-card">
      <div class="hero-copy">
        <p class="eyebrow" id="heroEyebrow"></p>
        <span class="template-name" id="heroBadge"></span>
        <h1 id="heroTitle"></h1>
        <p class="hero-role" id="heroRole"></p>
        <p class="hero-text" id="heroSummary"></p>

        <div class="hero-actions">
          <a class="primary-button" id="primaryButton" href="#contacto">Contactar</a>
          <a class="secondary-button" id="secondaryButton" href="#experiencia">Ver experiencia</a>
        </div>
      </div>

      <div class="hero-side">
        <div class="status-card floating-card">
          <span class="badge" id="statusBadge"></span>
          <strong id="statusTitle"></strong>
          <p id="statusText"></p>
        </div>

        <div class="mini-grid">
          <article class="mini-card">
            <span id="miniCardNumberOne"></span>
            <strong id="miniCardTitleOne"></strong>
          </article>
          <article class="mini-card">
            <span id="miniCardNumberTwo"></span>
            <strong id="miniCardTitleTwo"></strong>
          </article>
        </div>
      </div>
    </section>

    <section class="panel-grid">
      <article class="panel accent-panel">
        <p class="eyebrow">Perfil Profesional</p>
        <h2>Resumen</h2>
        <p id="profileText"></p>
      </article>

      <article class="panel">
        <p class="eyebrow">Competencias Clave</p>
        <div class="chips-grid" id="coreSkills"></div>
      </article>

      <article class="panel">
        <p class="eyebrow">Trabajo Remoto</p>
        <ul class="feature-list" id="remoteSkills"></ul>
      </article>
    </section>

    <section class="panel timeline-panel" id="experiencia">
      <p class="eyebrow">Experiencia Laboral</p>
      <h2>Trayectoria profesional</h2>
      <div class="timeline-list" id="experienceList"></div>
    </section>

    <section class="details-grid">
      <article class="panel">
        <p class="eyebrow">Formacion Academica</p>
        <div class="stack-list" id="educationList"></div>
      </article>

      <article class="panel">
        <p class="eyebrow">Cursos Complementarios</p>
        <div class="stack-list" id="coursesList"></div>
      </article>
    </section>

    <section class="details-grid">
      <article class="panel">
        <p class="eyebrow">Herramientas</p>
        <div class="chips-grid tools-grid" id="toolsList"></div>
      </article>

      <article class="panel message-panel" id="messagePanel">
        <p class="eyebrow" id="messageEyebrow"></p>
        <h2 id="dynamicTitle"></h2>
        <p id="dynamicText"></p>
      </article>
    </section>

    <section class="panel social-panel" id="contacto">
      <p class="eyebrow">Contacto</p>
      <h2>Enlaces y medios de contacto</h2>
      <div class="social-links-grid" id="socialLinksGrid"></div>
    </section>
  </main>

  <script src="js/data.js"></script>
  <script src="js/render.js"></script>
  <script src="js/actions.js"></script>
  <script src="js/animations.js"></script>
</body>
</html>
